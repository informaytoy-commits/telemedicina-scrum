<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telemedicina - Crear Cuenta</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <style>
        .login-card {
            max-width: 450px !important; /* Ajuste sutil para registro */
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon" id="logoIconContainer" style="overflow: hidden;">
                    <svg id="defaultAvatarIcon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                        <circle cx="8.5" cy="7" r="4"></circle>
                        <polyline points="17 11 19 13 23 9"></polyline>
                    </svg>
                    <img id="avatarPreviewImg" src="" alt="Preview" style="display: none; width: 100%; height: 100%; object-fit: cover;">
                </div>
                <h1>Registro Nuevo</h1>
                <p>Crea tu cuenta para ingresar a la plataforma</p>
            </div>
            
            <form id="registerForm" class="login-form" enctype="multipart/form-data">
                <div class="input-group">
                    <label for="nombre">Nombre Completo</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        <input type="text" id="nombre" name="nombre" required placeholder="Tu nombre y apellido" autocomplete="name">
                    </div>
                </div>

                <div class="input-group">
                    <label for="email">Correo Electrónico</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                        <input type="email" id="email" name="email" required placeholder="tu@correo.com" autocomplete="email">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="input-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                            <input type="password" id="password" name="password" required placeholder="Mínimo 6" minlength="6" autocomplete="new-password">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="confirm_password">Confirmar clave</label>
                        <div class="input-wrapper">
                            <input type="password" id="confirm_password" name="confirm_password" required placeholder="Repite la clave" minlength="6" autocomplete="new-password">
                        </div>
                    </div>
                </div>

                <div class="form-row" style="margin-top: -0.5rem">
                    <div class="input-group">
                        <label for="ci">Documento de Identidad (CI)</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                            <input type="text" id="ci" name="ci" required placeholder="Ej. 12345678">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="telefono">Teléfono</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            <input type="text" id="telefono" name="telefono" required placeholder="Tu teléfono activo">
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label for="foto">Foto de Perfil <span style="color:var(--text-muted); font-size: 0.75rem">(Opcional)</span></label>
                    <div class="input-wrapper">
                        <input type="file" id="foto" name="foto" accept="image/png, image/jpeg" style="padding: 0.5rem; font-size: 0.8rem">
                    </div>
                </div>

                <!-- Selector de Rol -->
                <div class="input-group" style="margin-top: 0.5rem; margin-bottom: 0.5rem;">
                    <label for="rol">¿Cómo deseas registrarte?</label>
                    <div class="input-wrapper">
                        <select id="rol" name="rol" required style="width: 100%; padding: 0.75rem 1rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-family: inherit; color: var(--text-main); font-size: 0.875rem; appearance: none; background-color: var(--surface);">
                            <option value="paciente">Como Paciente (Quiero atender mi salud)</option>
                            <option value="medico">Como Médico (Quiero brindar atención)</option>
                        </select>
                        <div style="position: absolute; right: 1rem; pointer-events: none; color: var(--text-muted);">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                        </div>
                    </div>
                </div>

                <!-- Formulario condicional paramédicos -->
                <div id="medicoFields" class="hidden" style="border: 1px dashed var(--border); padding: 1.5rem; border-radius: var(--radius-md); background-color: #f8fafc; display: flex; flex-direction: column; gap: 1rem;">
                    <h3 style="font-size: 1rem; color: var(--text-main); margin-bottom: -0.5rem;">Credenciales Médicas</h3>
                    <div class="input-group">
                        <label for="especialidad">Especialidad Principal *</label>
                        <input type="text" id="especialidad" name="especialidad" autocomplete="off" placeholder="Ej. Cardiólogo Clínico" class="input-wrapper" style="width:100%; box-sizing: border-box; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-md);">
                    </div>
                    <div class="input-group">
                        <label for="matricula_profesional">Matrícula Profesional *</label>
                        <input type="text" id="matricula_profesional" name="matricula_profesional" autocomplete="off" placeholder="Licencia / Colegiatura" class="input-wrapper" style="width:100%; box-sizing: border-box; padding: 0.75rem; border: 1px solid var(--border); border-radius: var(--radius-md);">
                    </div>
                    <div class="input-group">
                        <label for="documento">Documento de Respaldo Técnico (Obligatorio) * <span style="display:block; color:var(--text-muted); font-size: 0.75rem; font-weight: normal; margin-top:2px">Sube tu título o CV (PDF/JPG/PNG max 5MB). Tu cuenta debe ser verificada por un administrador antes de ingresar.</span></label>
                        <input type="file" id="documento" name="documento" accept=".pdf, image/png, image/jpeg" style="padding: 0.5rem; border: 1px solid var(--border); border-radius: var(--radius-md); font-size: 0.8rem; background-color: white">
                    </div>
                </div>

                <div id="errorMessage" class="error-message"></div>

                <button type="submit" id="submitButton" class="btn btn-primary" style="margin-top: 1rem;">
                    <span class="btn-text">Registrarse</span>
                    <span class="btn-loader"></span>
                </button>
                
                <div style="text-align: center; margin-top: 1rem;">
                    <p style="font-size: 0.875rem; color: var(--text-muted);">
                        ¿Ya tienes una cuenta? <a href="/login.html" style="color: var(--primary); text-decoration: none; font-weight: 500;">Inicia sesión</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Toast Notifications -->
    <div id="toastContainer" class="toast-container"></div>
    
    <script src="/app.js"></script>
    <script src="/register.js"></script>
</body>
</html>
